name: Build and Release Mod

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Vintage Story publishes API/mod stubs to its own NuGet feed.
    - name: Add VS NuGet source
      run: dotnet nuget add source https://nuget.vintagestory.at/index.json --name VintageStory

    - name: Restore (NuGet stub DLLs, no local game install)
      run: dotnet restore TSearch.csproj

    - name: Build
      run: dotnet build TSearch.csproj --configuration Release --no-restore

    - name: Pack mod zip
      run: |
        mkdir -p dist
        zip -j dist/TSearch.zip bin/Release/net10.0/TSearch.dll resources/modinfo.json

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TSearch
        path: dist/TSearch.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/TSearch.zip
